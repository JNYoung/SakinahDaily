name: sakinah_daily
description: A Quran, Dua, Dhikr, and prayer calm MVP app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  crypto: ^3.0.6
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  http: ^1.2.2
  shared_preferences: ^2.5.3
  adhan_dart: ^2.0.1
  flutter_local_notifications: ^19.4.1
  timezone: ^0.10.1
  just_audio: ^0.10.5

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/content/
