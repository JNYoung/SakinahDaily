name: Local E2E

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  local-e2e:
    name: Flutter and Play readiness gates
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter --no-version-check pub get

      - name: Install Python image dependencies
        run: python3 -m pip install --user pillow

      - name: Run local e2e gate
        env:
          SAKINAH_E2E_SKIP_ANDROID_LAUNCH: "true"
          SAKINAH_E2E_RUN_RELEASE_GATE: "false"
          SAKINAH_E2E_SKIP_FLUTTER_TEST: "false"
          SAKINAH_E2E_SKIP_DART_ANALYZE: "false"
        run: scripts/verify_local_e2e.sh
