openapi: 3.1.0
info:
  title: Sakinah Content Agent Service
  version: 0.1.0
paths:
  /agent-runs:
    post:
      summary: Create a weekly preproduction agent run
    get:
      summary: List agent runs
  /agent-runs/{run_id}:
    get:
      summary: Get an agent run
  /agent-runs/{run_id}/review-packet:
    get:
      summary: Get candidates and source context for human review
  /agent-candidates/{candidate_id}/qa:
    post:
      summary: Run guardrail QA for a candidate
  /agent-candidates/{candidate_id}/promote-to-cms-draft:
    post:
      summary: Promote candidate to CMS draft without publishing
